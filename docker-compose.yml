services:
  ollama:
    image: ollama/ollama:latest
    container_name: luamts-ollama
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_PARALLEL:-1}
      OLLAMA_NO_CLOUD: ${OLLAMA_NO_CLOUD:-1}
    ports:
      - "${OLLAMA_PUBLISHED_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      OLLAMA_LOCAL_GGUF_BASENAME: ${OLLAMA_LOCAL_GGUF_BASENAME:-}
    volumes:
      - ${OLLAMA_LOCAL_GGUF_DIR:-./docker/models}:/models:ro
      - ./docker/ollama/init-model.sh:/init-model.sh:ro
    entrypoint: ["/bin/sh", "/init-model.sh"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: luamts-api
    depends_on:
      ollama-model-init:
        condition: service_completed_successfully
    environment:
      PYTHONPATH: /app:/app/apps/api
      APP_HOST: 0.0.0.0
      APP_PORT: 8011
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:9b}
      OLLAMA_REQUEST_TIMEOUT: ${OLLAMA_REQUEST_TIMEOUT:-420}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-4096}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-256}
      OLLAMA_BATCH: ${OLLAMA_BATCH:-1}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.7}
      OLLAMA_TOP_P: ${OLLAMA_TOP_P:-0.8}
      OLLAMA_TOP_K: ${OLLAMA_TOP_K:-20}
      OLLAMA_MIN_P: ${OLLAMA_MIN_P:-0.0}
      OLLAMA_PRESENCE_PENALTY: ${OLLAMA_PRESENCE_PENALTY:-1.5}
      OLLAMA_REPEAT_PENALTY: ${OLLAMA_REPEAT_PENALTY:-1.0}
      OLLAMA_PARALLEL: ${OLLAMA_PARALLEL:-1}
      OLLAMA_NO_CLOUD: ${OLLAMA_NO_CLOUD:-1}
      STYLUA_BIN: /usr/local/bin/stylua
      LUACHECK_BIN: /usr/local/bin/luacheck
      LUA_BIN: /usr/bin/lua5.4
      LUAMTS_HISTORY_FILE: /root/.luamts/history
    ports:
      - "${API_PUBLISHED_PORT:-8011}:8011"
    volumes:
      - luamts-api-state:/root/.luamts
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8011"]

volumes:
  ollama-data:
  luamts-api-state:
